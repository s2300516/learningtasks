<html>
	<head>
		<title>..:4 Boxes:..</title>
	</head>
    <style type = "text/css">
        body{
            background-color: #6e6b85;
        }
        .wrapper{
            background-color: #FFFFFF;
            width: 400px;
            height: 400px;
            border-left: 2px solid #f5425a;   
            border-right: 2px solid #f242c2;
            border-top: 2px solid #5142f5;
            border-bottom: 2px solid #5142f5;
            margin: 0 auto;
        }
        .wrapper div{
            width: 192px;
            height: 192px;
            margin: 2px;
            border: 2px solid red;
            float: left;
        }
	.box-1{
	    background-color: #7fb319;
	}
	.box-2{
	    background-color: #b39e19;
	}
	.box-3{
	    background-color: #b3194c;
	}
	.box-4{
	    background-color: #1928b3;
	}

    </style>
	<body>
        <div class="wrapper">
            <div class="box-1">1</div>
            <div class="box-2">2</div>
            <div class="box-3">3</div>
            <div class="box-4">4</div>
        </div>
	</body>
</html>
